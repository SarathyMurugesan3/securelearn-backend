server:
  port: 8080
spring:
  redis:
    host: localhost
    port: 6379
  cloud:
    gateway:
      routes:
        - id: auth-service
          uri: http://localhost:8081
          predicates:
           - path=/auth/**

        - id: content-service
          uri: http://localhost:8082
          predicates:
           - path=/content/**
      dafault-filters:
        - name: RequestRateLimiter
          args:
            redis-rate-limiter.replenishRate: 5
            redis-rate-limiter.burstCapacity: 10
