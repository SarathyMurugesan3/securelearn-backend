server:
  port: ${PORT:8080}
  forward-headers-strategy: framework   # Important for Render / proxy

spring:
  application:
    name: secure-edtech-backend

  jackson:
    default-property-inclusion: NON_NULL

  servlet:
    multipart:
      max-file-size: 100MB
      max-request-size: 100MB

  data:
    mongodb:
      auto-index-creation: true

  mongodb:
    uri: ${MONGODB_URI}

  main:
    lazy-initialization: false   # Ensure everything loads before ready

management:
  endpoint:
    health:
      probes:
        enabled: true      # Enables liveness & readiness endpoints

  endpoints:
    web:
      exposure:
        include: health,info

  health:
    livenessstate:
      enabled: true
    readinessstate:
      enabled: true

securelearn:
  jwt:
    # MUST be 32+ characters in production
    secret: ${JWT_SECRET:myLocalDevSecretKey123456789012345678901234567890}
    access-token-expiration: 900000        # 15 minutes
    refresh-token-expiration: 604800000    # 7 days

  registration:
    public-enabled: true

  risk:
    screenshot-score: 10
    device-limit: 3
    block-threshold: 50

  storage:
    pdf-path: ./secure-storage/pdf
    video-path: ./secure-storage/video